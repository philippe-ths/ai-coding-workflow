# Codex CLI project configuration
# Equivalent of Claude's .claude/settings.json for permission defaults.
#
# Codex uses sandbox-based permissions rather than per-command allowlists.
# The approval_policy controls when the user is prompted:
#   "on-failure"  — auto-approve in sandbox, escalate on failure
#   "on-request"  — model decides when to ask
#   "untrusted"   — only safe read commands auto-approved
#
# sandbox_mode controls filesystem access:
#   "read-only"         — no writes allowed
#   "workspace-write"   — writes confined to project + writable_roots
#   "danger-full-access" — unrestricted (not recommended)

# Allow commands to run in sandbox; escalate to user on sandbox failure.
# This lets safe git/shell reads run without prompts while still gating
# destructive operations through sandbox restrictions + hooks.
approval_policy = "on-failure"

# Allow writes within the project directory (and /tmp).
sandbox_mode = "workspace-write"

[features]
codex_hooks = true
